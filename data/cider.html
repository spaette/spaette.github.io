<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration File Viewer</title>
    
    <!-- 1. Load the Prism.js default LIGHT theme -->
    <link href="https://cloudflare.com" rel="stylesheet" />
    
    <!-- NEW: Load the CSS styling for the Toolbar/Copy plugin -->
    <link href="https://cloudflare.com" rel="stylesheet" />
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff;
            color: #24292f;
        }
        h1 {
            border-bottom: 1px solid #d0d7de;
            padding-bottom: 10px;
            color: #1f2328;
        }
        /* Give the light code box a subtle border and clean spacing */
        pre[class*="language-"] {
            border: 1px solid #d0d7de;
            border-radius: 6px;
            background-color: #f6f8fa !important;
            padding: 16px;
            /* Keeps the page from breaking on mobile if a line is long */
            overflow-x: auto; 
        }
        
        /* NEW: Subtle style adjustments to make the built-in copy button match our theme */
        div.code-toolbar > .toolbar .toolbar-item > button {
            background: #ffffff !important;
            color: #24292f !important;
            border: 1px solid #d0d7de !important;
            border-radius: 4px !important;
            padding: 4px 8px !important;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05) !important;
            cursor: pointer;
        }
        div.code-toolbar > .toolbar .toolbar-item > button:hover {
            background: #f6f8fa !important;
            border-color: #fd8c73 !important; /* Visual indicator when hovering */
        }
    </style>
</head>
<body>

    <h1>Project Configuration</h1>
    <p>Below is the rendered view of the colon-delimited text file configuration.</p>

    <!-- 2. The colon-delimited data inside plaintext tags -->
    <pre class="language-plaintext"><code class="language-plaintext"># Format -> username:access_level:department:status
admin:superuser:it_security:active
jdoe:editor:marketing:active
asmith:viewer:finance:suspended
bwalker:manager:operations:active</code></pre>

    <!-- 3. Load the core Prism.js engine -->
    <script src="https://cloudflare.com"></script>
    
    <!-- 4. Load the plaintext support module to cleanly style standard files -->
    <script src="https://cloudflare.com"></script>

    <!-- NEW: Load the Toolbar and Copy to Clipboard plugins in order -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

</body>
</html>
