<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tcl Script Viewer</title>
    
    <!-- 1. Load the Prism.js default LIGHT theme -->
    <link href="https://cloudflare.com" rel="stylesheet" />
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff;
            color: #24292f;
        }
        h1 {
            border-bottom: 1px solid #d0d7de;
            padding-bottom: 10px;
            color: #1f2328;
        }
        /* Give the light code box a subtle border and clean spacing */
        pre[class*="language-"] {
            border: 1px solid #d0d7de;
            border-radius: 6px;
            background-color: #f6f8fa !important;
            padding: 16px;
        }
    </style>
</head>
<body>

    <h1>My Project Source Code</h1>
    <p>Below is the rendered view of the hello-world.tcl script.</p>

    <!-- 2. The Tcl code is now written directly inside the <code> tags -->
    <pre class="language-tcl"><code class="language-tcl"># Hello World program in Tcl
set message "Hello, World!"
puts $message

# Example loop
for {set i 0} {$i < 3} {incr i} {
    puts "Line [expr $i + 1]: $message"
}</code></pre>

    <!-- 3. Load the core Prism.js engine -->
    <script src="https://cloudflare.com"></script>
    
    <!-- 4. Load the Tcl language support module -->
    <script src="https://cloudflare.com"></script>

</body>
</html>
